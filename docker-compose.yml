version: '3.9'

services:
  oinkview:
    image: oinkview:latest
    build: .
    container_name: oinkview
    restart: unless-stopped
    user: "0"
    ports:
      - "3000:3000"
    volumes:
      # OinkView configuration (settings.json persists here)
      - ./config:/app/config

      # Règles : copier local.rules et dossier community/ ici avant de démarrer
      - ./rules:/snort/rules

      # Logs : configurer Snort pour écrire dans ce dossier
      - ./logs:/snort/logs:ro

      # Binaire Snort (pour validation config et test PCAP)
      - /usr/local/bin/snort:/usr/local/bin/snort:ro

      # Config Snort (pour validation et vue globale) — optionnel
      - /usr/local/etc/snort:/usr/local/etc/snort:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Allow Snort reload via sudo/systemctl from container — optional
    # cap_add:
    #   - SYS_PTRACE
