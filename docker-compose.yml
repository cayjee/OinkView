version: '3.9'

services:
  oinkview:
    image: oinkview:latest
    build: .
    container_name: oinkview
    restart: unless-stopped
    user: "0"
    ports:
      - "3000:3000"
    volumes:
      # OinkView configuration (settings.json persists here)
      - ./config:/app/config

      # Snort paths — edit .env to match your installation (copy .env.example to .env)
      - ${SNORT_RULES_DIR:-/etc/snort/rules}:${SNORT_RULES_DIR:-/etc/snort/rules}
      - ${SNORT_CONFIG_DIR:-/usr/local/etc/snort}:${SNORT_CONFIG_DIR:-/usr/local/etc/snort}:ro
      - ${SNORT_BIN:-/usr/local/bin/snort}:${SNORT_BIN:-/usr/local/bin/snort}:ro
      - ${SNORT_LOG_DIR:-/var/log/snort}:${SNORT_LOG_DIR:-/var/log/snort}:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Allow Snort reload via sudo/systemctl from container — optional
    # cap_add:
    #   - SYS_PTRACE
