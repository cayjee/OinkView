version: '3.9'

services:
  oinkview:
    image: oinkview:latest
    build: .
    container_name: oinkview
    restart: unless-stopped
    user: "0"
    ports:
      - "3000:3000"
    volumes:
      # OinkView configuration (settings.json persists here)
      - ./config:/app/config

      # Mount Snort rules directory (local.rules rw, rest ro via bind)
      - /etc/snort/rules:/etc/snort/rules

      # Mount your Snort log file (read-only)
      - /var/log/snort/alert_fast.txt:/var/log/snort/alert_fast.txt:ro

      # Mount Snort config for overview parsing (read-only) — optional
      # - /usr/local/etc/snort/snort.lua:/usr/local/etc/snort/snort.lua:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Allow Snort reload via sudo/systemctl from container — optional
    # cap_add:
    #   - SYS_PTRACE
