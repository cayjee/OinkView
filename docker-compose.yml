version: '3.9'

services:
  oinkview:
    image: oinkview:latest
    build: .
    container_name: oinkview
    restart: unless-stopped
    user: "0"
    ports:
      - "3000:3000"
    volumes:
      # OinkView configuration (settings.json persists here)
      - ./config:/app/config

      # Snort rules — covers any subdirectory configured in OinkView settings
      - /etc/snort:/etc/snort

      # Snort 3 default install path (config, rules, includes)
      - /usr/local/etc/snort:/usr/local/etc/snort

      # Snort binary — needed for config validation and PCAP test
      - /usr/local/bin/snort:/usr/local/bin/snort:ro

      # Snort logs — covers any log file path configured in OinkView settings
      - /var/log/snort:/var/log/snort:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Allow Snort reload via sudo/systemctl from container — optional
    # cap_add:
    #   - SYS_PTRACE
